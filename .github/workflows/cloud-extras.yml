name: cloud-extras

# Runs the IP-independent pipelines (GitHub Trending projects + daily AI ideas) in
# the cloud, so they keep posting to Vertex even when the laptop is off. These need
# no residential IP (pure HTTP + AI APIs), unlike the LinkedIn/X scrapers which must
# stay local.
#
# >>> TO ACTIVATE:
# 1. Add these repo secrets (Settings -> Secrets and variables -> Actions):
#      TELEGRAM_BOT_TOKEN, GEMINI_API_KEY, GROQ_API_KEY, OPENROUTER_API_KEY,
#      TELEGRAM_TOPIC_CHAT_ID  (= -1003915145933),  CHANNEL (= @vertex1_tech)
# 2. Uncomment the `schedule:` cron below.
# 3. Then DISABLE the local "Projects-Digest" task and remove tg-ideas from
#    Daily-Extras (extras.cmd) — otherwise local + cloud both post = duplicates.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,16 * * *"       # 09:00 & 19:00 Baghdad (UTC+3) — projects + ideas, twice/day

permissions:
  contents: read

jobs:
  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: deps
        run: pip install --upgrade requests beautifulsoup4
      - name: restore dedup state
        uses: actions/cache@v4
        with:
          path: |
            src/tg/github-state.json
            src/tg/ideas-state.json
          key: vertex-extras-state-${{ github.run_id }}
          restore-keys: vertex-extras-state-
      - name: projects (GitHub trending -> 680 + channel)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOPIC_CHAT_ID: ${{ secrets.TELEGRAM_TOPIC_CHAT_ID }}
          CHANNEL: ${{ secrets.CHANNEL }}
        run: python src/tg/tg-github.py 680 2
      - name: ideas (daily AI ideas -> 679)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_TOPIC_CHAT_ID: ${{ secrets.TELEGRAM_TOPIC_CHAT_ID }}
        run: python src/tg/tg-ideas.py 679 1
