name: LinkedIn Monitor

# PAID Apify monitor — DISABLED (schedule removed) in favour of the free local
# Playwright scraper (src/monitor/li-scrape.py). Kept as manual-only fallback.
on:
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      # Rolling cache: unique key per run (always saved at job end) + restore-keys
      # prefix so every run restores the MOST RECENT previous state. Without this,
      # an exact key that never matches the save key makes every run start fresh
      # and re-send old posts. v2 = clean baseline.
      - name: Restore monitor state (auto-saves at job end)
        uses: actions/cache@v4
        with:
          path: monitor-state.json
          key: monitor-state-v2-${{ github.run_id }}
          restore-keys: |
            monitor-state-v2-
      - name: Install deps
        run: npm install --no-audit --no-fund --ignore-scripts
      - name: Run monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_ID: ${{ vars.TELEGRAM_GROUP_ID }}
          MONITOR_ACCOUNTS: ${{ vars.MONITOR_ACCOUNTS }}
          MONITOR_POSTS_PER_CHECK: ${{ vars.MONITOR_POSTS_PER_CHECK || '3' }}
          TELEGRAM_TOPIC_CHAT_ID: ${{ vars.TELEGRAM_TOPIC_CHAT_ID }}
          TELEGRAM_TOPIC_MONITOR: ${{ vars.TELEGRAM_TOPIC_MONITOR }}
          TELEGRAM_TOPIC_STATUS: ${{ vars.TELEGRAM_TOPIC_STATUS }}
        run: node src/monitor/run-monitor.js
